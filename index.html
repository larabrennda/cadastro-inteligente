<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="form-container">
  <h1>Cadastro</h1>

  <form id="cadastroForm" novalidate>

    <div class="form-group">
      <label for="nome">Nome</label>
      <input type="text" id="nome" name="nome" required minlength="3" autocomplete="name">
      <span id="nome-error" class="error-msg"></span>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email">
      <span id="email-error" class="error-msg"></span>
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" required minlength="8" autocomplete="new-password">
      <span id="senha-error" class="error-msg"></span>
    </div>

    <div class="form-group">
      <label for="confirmar">Confirmar Senha</label>
      <input type="password" id="confirmar" name="confirmar" required>
      <span id="confirmar-error" class="error-msg"></span>
    </div>

    <button type="submit" id="btnSubmit">Criar Conta</button>

  </form>
</div>

<script src="js/validation.js"></script>
</body>
</html>
